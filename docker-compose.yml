services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: buckteeth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/buckteeth
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY in .env}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: >
      sh -c "alembic upgrade head &&
             uvicorn buckteeth.main:app --host 0.0.0.0 --port 8000"

  web:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${PORT:-80}:80"

volumes:
  pgdata:
